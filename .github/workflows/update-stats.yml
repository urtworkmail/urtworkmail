name: Global Code Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Profile Repo
        uses: actions/checkout@v4

      - name: Install cloc and gh cli
        run: sudo apt-get install -y cloc

      - name: Fetch and Count All Repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir all_repos && cd all_repos
          # Fetch all your public repositories and clone them
          gh repo list YOUR_GITHUB_USERNAME --public --limit 100 --json url -q '.[].url' | xargs -n 1 git clone --depth 1
          cd ..
          
          # Run cloc on the folder containing all cloned repos
          STATS=$(cloc all_repos --md --exclude-dir=.github)
          
          # Inject stats into README
          sed -i "/<!-- CLOC-START -->/,/<!-- CLOC-END -->/{ /<!-- CLOC-START -->/b; /<!-- CLOC-END -->/b; d; }" README.md
          sed -i "/<!-- CLOC-START -->/a \\$STATS" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update total lines across all repos" || exit 0
          git push
