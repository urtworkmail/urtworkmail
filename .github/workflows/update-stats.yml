name: Update Profile Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Opt into Node.js 24 globally for this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Updated to v4 (check for v5 if available by mid-2026)
      - name: Checkout Repository
        uses: actions/checkout@v4 

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Generate Stats
        run: |
          STATS=$(cloc . --md --exclude-dir=.github)
          # Use a temporary file to safely inject stats between markers
          sed -e '/<!-- CLOC-START -->/,/<!-- CLOC-END -->/!b' \
              -e '/<!-- CLOC-START -->/!d;r /dev/stdin' README.md <<< "$STATS" > README.tmp && mv README.tmp README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add README.md
          git commit -m "Update code statistics (Node 24)" || exit 0
          git push
