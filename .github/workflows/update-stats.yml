name: Global Code Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Profile Repo
        uses: actions/checkout@v5

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Fetch and Count All Repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir temp_repos && cd temp_repos
          
          # Notice the fixed --visibility=public flag here!
          gh repo list urtworkmail --visibility=public --limit 100 --json url -q '.[].url' | xargs -n 1 git clone --depth 1
          cd ..
          
          cloc temp_repos --md --exclude-dir=.github > stats.md
          
          # The new, crash-proof way to build the README
          sed -n '1,//p' README.md > README.new
          cat stats.md >> README.new
          sed -n '//,$p' README.md >> README.new
          
          mv README.new README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update total lines across all repos (Fixed)" || exit 0
          git push
